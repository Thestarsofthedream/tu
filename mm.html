<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>个人发布页</title>
<meta name="renderer" content="webkit" />
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
<link rel="shortcut icon" href="favicon.ico">
<meta name="keywords" content="引导页,个人引导页,个人主页">
<meta name="description" content="个人引导页,个人引导页,个人主页">
</head>
<style>
    * {
	margin: 0;
	padding: 0;
	font-family: "微软雅黑";
	box-sizing: border-box;
}

body {
	min-height: 100vh;
	padding: 30px 0;
	background: linear-gradient(to right, #bb313e, #bb313e, #d72229, #dd4a16, #e47615, #f5c500, #f0e927, #b1ce24, #48a935, #039445, #157c4f, #176a58, #1b5563, #1d386f, #1d386f, #202778, #522663, #8a244b);
}

.main {
	max-width: 350px;
	margin: 0 auto;
	display: flex;
	justify-content: center;
	align-items: center;
}

.item {
	flex: 1;
	width: 0;
	height: 480px;
	border-radius: 15px;
	position: relative;
	padding: 5px 30px;
}

.item img {
	height: 100px;
	width: 100px;
	padding: 10px;
	border: 0px solid rgba(255, 255, 255, 0.5);
	border-radius: 15px;
	display: block;
	margin: 0 auto;
}

.item h3 {
	color: #FFF;
	text-align: center;
	font-size: 24px;
	line-height: 45px;
	margin-top: 0px;
}

.item p {
	color: #FFF;
	line-height: 25px;
	font-size: 12px;
	margin-top: 10px;
}

.item .btns {
	display: flex;
	flex-direction: row;
	align-items: center;
	justify-content: center;
	margin-top: 20px;
}

.item .btns1 {
	display: flex;
	flex-direction: row;
	align-items: center;
	justify-content: center;
	margin-top: 20px;
}

.item a {
	text-decoration: none;
	display: block;
	width: 250px;
	line-height: 38px;
	text-align: center;
	border-radius: 100px;
	background: #FFF;
	font-size: 15px;
	font-weight: bold;
	cursor: pointer;
}

.item a:hover {
	opacity: 0.8;
}

@media screen and (max-width: 730px) {
	body {
		padding: 20px;
	}

	.main {
		display: block;
	}

	.item {
		width: 100%;
		margin: 0 !important;
		margin-bottom: 15px !important;
		transform: scale(1) !important;
	}
}

.text-center {
	text-align: center;
	text-decoration: none；
}

.innyun {
	max-width: 350px;
	margin: 0 auto;
	background-color: #ffffff;
	border-radius: 20px;
	padding: 10px;
	margin-bottom: 20px;
}

.fanl {
	width: 100%;
	display: block;
	height: auto;
	border-radius: 10px;
	cursor: pointer;
}

@keyframes shake_button {
	0% {
		transform: translateX(3px) rotate(1deg)
	}

	2.5% {
		transform: translateX(-3px) rotate(-1deg)
	}

	5% {
		transform: translateX(3px) rotate(1deg)
	}

	7.5% {
		transform: translateX(-3px) rotate(-1deg)
	}

	10% {
		transform: translateX(2px) rotate(1deg)
	}

	12.5% {
		transform: translateX(-2px) rotate(-1deg)
	}

	15% {
		transform: translateX(2px) rotate(1deg)
	}

	17.5% {
		transform: translateX(-2px) rotate(-1deg)
	}

	20% {
		transform: translateX(1px) rotate(1deg)
	}

	22.5% {
		transform: translateX(-1px) rotate(-1deg)
	}

	25% {
		transform: translateX(0) rotate(0deg)
	}
}
</style>
<body>
<div class="innyun">
<a style="padding: 0px;" target="_blank" href="https://www.fanl.cn">
<img class="fanl" style="height: 120px;" src="favicon.ico">
</a></div>
<div class="main">
<div class="item" style="background:linear-gradient(to right, rgb(64, 153, 255), rgb(56, 114, 255));z-index:3;transform:scale(1);">
    <img src="g?b=qq&amp;nk=846208356&amp;s=100" alt="img">
<h3>个人发布页</h3>
<h3><p style="color: #FFF;">地址发布页</p></h3>
<div class="btns1">
<a style="color:#3875ff; animation: shake_button 3s linear 0s infinite normal none running;" href="http://" target="_self">待添加</a>
<br><br></div>
<div class="btns">
<a style="color:#3875ff;margin-left:0px;" href="https://" target="_self">待添加</a></div>
<div class="btns">
<a style="color:#3875ff;margin-left:0px;" href="https://www.fanl.cn" target="_self">钟好烦的主页</a></div>
</div></div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到</title>
    <style>
        /* 全局样式重置与背景设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 背景色近似图片中的深蓝紫色 */
            background-color: #1a1a2e;
            /* 字体平滑 */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 主容器：垂直水平居中 */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            color: #fff;
        }

        /* 顶部引言样式 */
        .quote {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 24px;
            margin-bottom: 60px;
            /* 模拟图片中的粉色渐变 */
            background: linear-gradient(90deg, #ff7eb3, #ff758c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 中间段落容器 */
        .content {
            max-width: 600px;
            margin-bottom: 50px;
        }

        .content p {
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 20px;
            color: #c5c6c7; /* 浅灰色文字 */
            line-height: 1.8;
            margin-bottom: 10px;
        }

        /* 分割线样式 */
        .divider {
            width: 80%;
            max-width: 400px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ff7eb3, transparent);
            margin-bottom: 50px;
        }

        /* 底部按钮样式 */
        .btn-home {
            display: inline-block;
            padding: 15px 50px;
            font-family: "Microsoft YaHei", sans-serif;
            font-size: 24px;
            color: #ff7eb3; /* 粉色文字 */
            text-decoration: none;
            border: 1px solid rgba(255, 126, 179, 0.3);
            border-radius: 50px;
            transition: all 0.3s ease;
            /* 按钮微弱发光效果 */
            box-shadow: 0 0 15px rgba(255, 126, 179, 0.2);
            cursor: pointer;
            outline: none;
        }

        .btn-home:hover {
            background-color: rgba(255, 126, 179, 0.1);
            box-shadow: 0 0 25px rgba(255, 126, 179, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 顶部文案 -->
        <div class="quote">后来，错过也成了人间常态。</div>

        <!-- 中间说明文案 -->
        <div class="content">
            互联网是一片海洋，
            网站犹如一座座孤岛漂浮在其上，
            唯有超链接将它们联系起来。
        </div>

        <!-- 虚线分割线 -->
        <div class="divider"></div>

        <!-- 首页按钮 -->
        <a href="/" class="btn-home">首页</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="专业图片放大器识别码生成工具">
    <title>图片放大器识别码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 550px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }
        
        .header {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            padding: 35px 30px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 16px;
            max-width: 80%;
            margin: 0 auto;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .content {
            padding: 40px;
        }
        
        .input-group {
            margin-bottom: 30px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 12px;
            color: #333;
            font-weight: 600;
            font-size: 16px;
        }
        
        .input-field {
            width: 100%;
            padding: 18px 20px;
            font-size: 18px;
            border: 2px solid #e1e5ee;
            border-radius: 12px;
            background: #f8f9fa;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .input-field:focus {
            border-color: #6a11cb;
            background: white;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }
        
        .input-field::placeholder {
            color: #999;
        }
        
        .result-container {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            border: 2px solid #e1e5ee;
            position: relative;
        }
        
        .result-label {
            display: block;
            color: #666;
            font-size: 15px;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .result-value {
            font-size: 36px;
            font-weight: 700;
            color: #6a11cb;
            word-break: break-all;
            min-height: 50px;
            line-height: 1.2;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(106, 17, 203, 0.3);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #666;
            border: 2px solid #e1e5ee;
        }
        
        .btn-secondary:hover {
            background: #e9ecef;
        }
        
        .info-section {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            border-left: 4px solid #6a11cb;
        }
        
        .info-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }
        
        .info-content {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .info-content p {
            margin-bottom: 10px;
        }
        
        .share-info {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #2575fc;
        }
        
        .footer {
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
            background: #f8f9fa;
        }
        
        .footer a {
            color: #6a11cb;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        
        @keyframes resultGlow {
            0% { box-shadow: 0 0 0 0 rgba(106, 17, 203, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(106, 17, 203, 0); }
            100% { box-shadow: 0 0 0 0 rgba(106, 17, 203, 0); }
        }
        
        .result-update {
            animation: pulse 0.3s ease, resultGlow 1s ease-out;
        }
        
        .copied {
            background: #28a745 !important;
        }
        
        .copied::after {
            content: " ✓";
        }
        
        @media (max-width: 600px) {
            .container {
                border-radius: 15px;
            }
            
            .content {
                padding: 25px;
            }
            
            .header {
                padding: 25px 20px;
            }
            
            .header h1 {
                font-size: 26px;
            }
            
            .header p {
                font-size: 14px;
            }
            
            .result-value {
                font-size: 28px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
        
        .tool-description {
            font-size: 13px;
            color: #888;
            margin-top: 8px;
            font-style: italic;
        }

    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🔍</div>
            <h1>图片放大器识别码生成器</h1>
            <p>专业的图片处理工具识别码计算与生成</p>
        </div>
        
        <div class="content">
            <div class="input-group">
                <label for="inputCode">
                    <i class="fas fa-key"></i> 输入图片识别码
                    <span class="tool-description">请输入图片放大器的原始识别码</span>
                </label>
                <input 
                    type="text" 
                    id="inputCode" 
                    class="input-field" 
                    placeholder="例如: 123456789012345" 
                    oninput="calc()"
                    autocomplete="off"
                >
            </div>
            
            <div class="result-container">
                <span class="result-label">生成结果</span>
                <div id="result" class="result-value">等待输入...</div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="copyResult()">
                    <i class="fas fa-copy"></i> 复制结果
                </button>
                <button class="btn btn-secondary" onclick="clearInput()">
                    <i class="fas fa-redo"></i> 重新计算
                </button>
                <a href="https://share.feijipan.com/s/2o14E0bqhttps://share.feijipan.com/s/2o14E0bq"class="btn btn-secondary ">软件下载链接</a>
            </div>
            
            <div class="info-section">
                <h3><i class="fas fa-info-circle"></i> 关于此工具</h3>
                <div class="info-content">
                    <p>本工具专为图片放大器系统设计，可将原始识别码转换为对应的验证码。适用于图片处理、图像放大、AI增强等场景。</p>
                    
                    <div class="share-info">
                        <p><strong>分享此工具：</strong> 将此页面链接发送给他人即可使用</p>
                        <p><strong>使用场景：</strong> 图片处理工具验证、图像放大器激活、AI增强识别等</p>
                    </div>
                    
                    <p><strong>说明：</strong></p>
                    <div class="formula-code">
                        原本软件只能免费使用10次<br>
                        要永久会员可以复制弹窗的识别码<br>
                        在这里生成永久卡密会员
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <p>© 2026 图片放大器识别码生成器 | 专业图片处理工具</p>
            <p>支持所有主流图片放大器系统 | 计算结果100%准确</p>
        </div>
    </div>

    <script>
        function calc() {
            let val = document.getElementById('inputCode').value.trim();
            let resultElement = document.getElementById('result');
            
            // 添加输入反馈动画
            resultElement.classList.remove('result-update');
            void resultElement.offsetWidth; // 触发重绘
            
            if (val === '') {
                resultElement.textContent = '等待输入...';
                resultElement.style.color = '#666';
                return;
            }
            
            try {
                // 验证输入是否为有效数字
                if (!/^-?\d+$/.test(val)) {
                    resultElement.textContent = '❌ 请输入有效数字';
                    resultElement.style.color = '#e53e3e';
                    return;
                }
                
                let parseLong = BigInt(val);
                
                const m1 = 10000000n;
                const m2 = 1000000n;
                
                let A = parseLong % m1;
                let B = parseLong / m1;
                let C = (A + B) % m2;
                
                resultElement.textContent = C.toString();
                resultElement.style.color = '#6a11cb';
                resultElement.classList.add('result-update');
                
            } catch (error) {
                resultElement.textContent = '❌ 计算错误，请检查输入';
                resultElement.style.color = '#e53e3e';
                console.error('计算错误:', error);
            }
        }
        
        function copyResult() {
            const resultText = document.getElementById('result').textContent;
            const copyBtn = document.querySelector('.btn-primary');
            
            if (resultText === '等待输入...' || resultText.includes('❌')) {
                alert('请先生成有效的结果');
                return;
            }
            
            navigator.clipboard.writeText(resultText).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.classList.add('copied');
                copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
                
                setTimeout(() => {
                    copyBtn.classList.remove('copied');
                    copyBtn.innerHTML = originalText;
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('复制失败，请手动选择并复制结果');
            });
        }
        
        function clearInput() {
            document.getElementById('inputCode').value = '';
            document.getElementById('result').textContent = '等待输入...';
            document.getElementById('result').style.color = '#666';
            document.getElementById('inputCode').focus();
        }
        
        // 添加页面加载后的输入框自动聚焦
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('inputCode').focus();
            
            // 添加示例识别码
            const examples = ['123456789012345', '987654321098765', '246813579024681'];
            const inputField = document.getElementById('inputCode');
            inputField.setAttribute('title', '示例识别码: ' + examples.join(', '));
        });
        
        // 添加键盘快捷键支持
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'c') {
                e.preventDefault();
                copyResult();
            }
            if (e.key === 'Escape') {
                clearInput();
            }
            if (e.key === 'Enter' && document.activeElement.id === 'inputCode') {
                document.getElementById('inputCode').blur();
            }
        });
    </script>
</body>
</html>
